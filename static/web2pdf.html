<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web to PDF | ThaiEdit Pro</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        main { flex: 1; display: flex; flex-direction: column; background: #f8f9fa; }
        
        .url-bar { background: white; padding: 1rem 2rem; display: flex; gap: 1rem; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 10; }
        .url-input { flex: 1; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; font-family: monospace; font-size: 0.9rem; }
        
        .preview-container { flex: 1; position: relative; padding: 2rem; overflow: auto; display: flex; justify-content: center; }
        
        #web-frame { width: 100%; height: 100%; border: 1px solid #eee; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .download-btn { padding: 0.8rem 1.5rem; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .download-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        .hint-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #adb5bd; }
        
        /* Note about Iframes */
        .security-note { font-size: 0.75rem; color: #999; margin-top: 0.5rem; padding: 0 2rem; }
    </style>
</head>
<body>
    <div class="url-bar">
        <input type="text" id="urlInput" class="url-input" placeholder="Enter URL (e.g., https://example.com)">
        <button onclick="loadURL()" class="download-btn">🔍 Load Web</button>
        <button id="exportBtn" onclick="exportToPDF()" class="download-btn" disabled>🚀 Download PDF</button>
    </div>
    
    <p class="security-note">⚠️ Note: Some websites may block iframe previews for security (X-Frame-Options). For better results, capture your own browser tab.</p>

    <main class="preview-container">
        <div id="no-content" class="hint-overlay">
            <div style="font-size: 4rem; margin-bottom: 1rem;">🌐</div>
            <h2>Web to PDF Converter</h2>
            <p>Enter a URL above to start the conversion</p>
        </div>
        <iframe id="web-frame" style="display: none;"></iframe>
    </main>

    <script>
        const urlInput = document.getElementById('urlInput');
        const frame = document.getElementById('web-frame');
        const exportBtn = document.getElementById('exportBtn');
        const noContent = document.getElementById('no-content');

        function loadURL() {
            let url = urlInput.value.trim();
            if (!url) return;
            
            if (!url.startsWith('http')) {
                url = 'https://' + url;
            }
            
            noContent.style.display = 'none';
            frame.style.display = 'block';
            frame.src = url;
            exportBtn.disabled = false;
        }

        async function exportToPDF() {
            const { jsPDF } = window.jspdf;
            exportBtn.textContent = '⏳ Processing...';
            exportBtn.disabled = true;

            try {
                // IMPORTANT: Due to CORS and iframe security, 
                // we can't always screenshot external iframes directly.
                // This tool works best for same-origin or public data.
                
                const canvas = await html2canvas(frame.contentWindow.document.body, {
                    useCORS: true,
                    scale: 2
                });
                
                const imgData = canvas.toDataURL('image/jpeg', 0.95);
                const pdf = new jsPDF('p', 'mm', 'a4');
                
                const pageWidth = pdf.internal.pageSize.getWidth();
                const pageHeight = pdf.internal.pageSize.getHeight();
                const imageWidth = canvas.width;
                const imageHeight = canvas.height;
                const ratio = Math.min(pageWidth / imageWidth, pageHeight / imageHeight);
                
                pdf.addImage(imgData, 'JPEG', 0, 0, imageWidth * ratio, imageHeight * ratio);
                pdf.save("web_capture.pdf");
                
            } catch (err) {
                console.error(err);
                alert("Cannot capture this specific site due to security restrictions (CORS/X-Frame). Try a different URL or same-origin page.");
            } finally {
                exportBtn.textContent = '🚀 Download PDF';
                exportBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
