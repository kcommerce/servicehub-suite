<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Stickers to Image</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        main { flex: 1; display: flex; overflow: hidden; }
        .sidebar {
            width: 350px;
            background: #fff;
            border-right: 1px solid #eee;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
        }
        .canvas-container {
            flex: 1;
            background: #e9ecef;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2rem;
            overflow: auto;
            position: relative;
        }
        #canvas {
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: crosshair;
            display: block;
            transform-origin: top left;
        }
        .sticker-gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .sticker-item {
            padding: 0.5rem;
            border: 1px solid #dfe6e9;
            border-radius: 8px;
            cursor: pointer;
            background: #f8f9fa;
            transition: all 0.2s;
            text-align: center;
        }
        .sticker-item:hover {
            border-color: var(--primary);
            background: #fff;
        }
        .sticker-item img {
            max-width: 100%;
            height: auto;
        }
        .hint {
            font-size: 0.8rem;
            color: #636e72;
            background: #fff9db;
            padding: 0.8rem;
            border-radius: 8px;
            border-left: 4px solid #fcc419;
        }
        .control-item {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            text-align: left;
        }
        .control-item label {
            font-weight: 600;
            font-size: 0.8rem;
            color: #2d3436;
        }
        .zoom-controls {
            display: flex;
            gap: 0.3rem;
        }
        .zoom-btn {
            flex: 1;
            padding: 0.4rem;
            border: 1px solid #dfe6e9;
            background: #f8f9fa;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <main>
        <div class="sidebar">
            <section class="upload-section">
                <label for="imgUpload" class="upload-btn">
                    <span>📁 Upload Image</span>
                    <input type="file" id="imgUpload" accept="image/*" hidden>
                </label>
            </section>

            <div class="control-item">
                <label>Zoom Level: <span id="zoomPercent">100</span>%</label>
                <div class="zoom-controls">
                    <button class="zoom-btn" onclick="adjustZoom(-0.1)">➖</button>
                    <button class="zoom-btn" onclick="adjustZoom(0.1)">➕</button>
                    <button class="zoom-btn" onclick="resetZoom()">🔄</button>
                </div>
            </div>

            <div class="active-stickers" style="font-size: 0.8rem;">
                Stickers: <b id="count">0</b>
                <button onclick="clearStickers()" style="float:right; font-size: 11px; cursor: pointer;">Clear All</button>
            </div>

            <div class="hint">
                💡 <b>Tip:</b> Click a sticker to add, then drag it.
            </div>

            <div class="sticker-gallery" id="gallery">
                <!-- Stickers populated by JS -->
            </div>

            <section class="actions">
                <button id="downloadBtn" class="download-btn" disabled>🚀 Download Result</button>
            </section>
        </div>

        <div class="canvas-container">
            <canvas id="canvas"></canvas>
            <div id="no-image-msg" style="color: #adb5bd;">Upload an image to start</div>
        </div>
    </main>

    <script>
        const stickerNames = [
            'hello', 'good_bye', 'hbd', 'cool', 'wow', 'love',
            'yes', 'no', 'great', 'lol', 'omg', 'success',
            'party', 'chill', 'cute', 'bff', 'smile', 'lucky',
            'ouch', 'done', 
            // 3D Emojis Set 1
            'heart_red', 'laugh_face', 'star_gold', 'fire_hot', 
            'thumbs_up_gold', 'cool_shades', 'rocket_ship', 'party_popper',
            // 3D Emojis Set 2 (New)
            'grinning_face', 'winking_face', 'heart_eyes', 'partying_face', 
            'thinking_face', 'mind_blown', 'sleepy_face', 'sweat_smile', 
            'zany_face', 'shushing_face', 'clapping_hands', 'victory_hand', 
            'crown_gold', 'trophy_gold', 'money_bag', 'gift_box', 
            'balloon_red', 'pizza_slice', 'burger_food', 'cake_birthday', 
            'coffee_cup', 'beer_mug', 'sun_bright', 'moon_full', 
            'sparkles_gold', 'rainbow_arc', 'cloud_rain', 'cat_face', 
            'dog_face', 'panda_face', 'lion_face', 'unicorn_face', 
            'airplane_fly', 'car_red', 'camera_pic', 'music_notes'
        ];

        const gallery = document.getElementById('gallery');
        const imgUpload = document.getElementById('imgUpload');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const downloadBtn = document.getElementById('downloadBtn');
        const countDisplay = document.getElementById('count');
        const zoomPercent = document.getElementById('zoomPercent');

        let originalImage = null;
        let selectedFile = null;
        let activeStickers = [];
        let draggingSticker = null;
        let dragOffsetX = 0, dragOffsetY = 0;
        let currentZoom = 1.0;

        // Populate gallery
        stickerNames.forEach(name => {
            const div = document.createElement('div');
            div.className = 'sticker-item';
            div.innerHTML = `<img src="/static/stickers/${name}.png" alt="${name}">`;
            div.onclick = () => addSticker(name);
            gallery.appendChild(div);
        });

        imgUpload.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (ev) => {
                    originalImage = new Image();
                    originalImage.onload = () => {
                        canvas.width = originalImage.width;
                        canvas.height = originalImage.height;
                        document.getElementById('no-image-msg').style.display = 'none';
                        activeStickers = [];
                        resetZoom();
                        draw();
                        downloadBtn.disabled = false;
                    };
                    originalImage.src = ev.target.result;
                };
                reader.readAsDataURL(selectedFile);
            }
        });

        function adjustZoom(delta) {
            currentZoom = Math.max(0.1, Math.min(5, currentZoom + delta));
            updateZoomUI();
        }

        function resetZoom() {
            if (!originalImage) return;
            const container = document.querySelector('.canvas-container');
            const ratio = (container.clientWidth - 100) / originalImage.width;
            currentZoom = Math.min(1.0, ratio);
            updateZoomUI();
        }

        function updateZoomUI() {
            canvas.style.width = (canvas.width * currentZoom) + 'px';
            canvas.style.height = (canvas.height * currentZoom) + 'px';
            zoomPercent.textContent = Math.round(currentZoom * 100);
        }

        function addSticker(name) {
            if (!originalImage) return;
            const sImg = new Image();
            sImg.src = `/static/stickers/${name}.png`;
            sImg.onload = () => {
                activeStickers.push({
                    name: name,
                    img: sImg,
                    x: canvas.width / 2 - sImg.width / 2,
                    y: canvas.height / 2 - sImg.height / 2,
                    w: sImg.width,
                    h: sImg.height
                });
                draw();
            };
        }

        function clearStickers() {
            activeStickers = [];
            draw();
        }

        function draw() {
            if (!originalImage) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(originalImage, 0, 0);
            activeStickers.forEach(s => {
                ctx.drawImage(s.img, s.x, s.y, s.w, s.h);
            });
            countDisplay.textContent = activeStickers.length;
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);

            for (let i = activeStickers.length - 1; i >= 0; i--) {
                const s = activeStickers[i];
                if (mouseX >= s.x && mouseX <= s.x + s.w && mouseY >= s.y && mouseY <= s.y + s.h) {
                    draggingSticker = s;
                    dragOffsetX = mouseX - s.x;
                    dragOffsetY = mouseY - s.y;
                    activeStickers.splice(i, 1);
                    activeStickers.push(s);
                    break;
                }
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!draggingSticker) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
            draggingSticker.x = mouseX - dragOffsetX;
            draggingSticker.y = mouseY - dragOffsetY;
            draw();
        });

        window.addEventListener('mouseup', () => { draggingSticker = null; });

        downloadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            downloadBtn.textContent = '⏳ Processing...';
            downloadBtn.disabled = true;

            const stickersForBackend = activeStickers.map(s => ({
                name: s.name,
                x: Math.round(s.x),
                y: Math.round(s.y),
                w: Math.round(s.w),
                h: Math.round(s.h)
            }));

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('stickers_json', JSON.stringify(stickersForBackend));

            try {
                const response = await fetch('/process-add-sticker', { method: 'POST', body: formData });
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `stickers_${selectedFile.name}`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                } else {
                    alert('Error processing image');
                }
            } catch (err) {
                console.error(err);
                alert('An error occurred');
            } finally {
                downloadBtn.textContent = '🚀 Download Result';
                downloadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
