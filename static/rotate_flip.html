<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotate & Flip Service</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .container {
            padding: 2rem;
            max-width: 800px;
            margin: auto;
            text-align: center;
        }
        .preview-area {
            margin-top: 2rem;
            background: #eee;
            padding: 2rem;
            border-radius: 12px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #previewImg {
            max-width: 100%;
            max-height: 500px;
            transition: transform 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .controls-group {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .control-btn {
            padding: 0.8rem 1.2rem;
            border: 1px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .control-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .control-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <h1>🔄 Rotate & Flip</h1>
            <p>Adjust your image orientation with instant preview.</p>
            
            <section class="upload-section" style="margin-top: 1.5rem;">
                <label for="imgUpload" class="upload-btn">
                    <span>📁 Upload Image</span>
                    <input type="file" id="imgUpload" accept="image/*" hidden>
                </label>
            </section>

            <div class="preview-area">
                <div id="placeholder" style="color: #adb5bd;">Upload an image to start</div>
                <img id="previewImg" src="" style="display: none;">
            </div>

            <section class="controls-group">
                <button class="control-btn" onclick="rotate(-90)">↺ -90°</button>
                <button class="control-btn" onclick="rotate(90)">↻ +90°</button>
                <button id="flipH" class="control-btn" onclick="toggleFlip('h')">↔ Flip H</button>
                <button id="flipV" class="control-btn" onclick="toggleFlip('v')">↕ Flip V</button>
            </section>

            <section class="actions" style="margin-top: 2rem;">
                <button id="downloadBtn" class="download-btn" disabled>🚀 Process & Download</button>
            </section>
        </div>
    </main>

    <script>
        const imgUpload = document.getElementById('imgUpload');
        const previewImg = document.getElementById('previewImg');
        const placeholder = document.getElementById('placeholder');
        const downloadBtn = document.getElementById('downloadBtn');
        
        let currentRotation = 0;
        let isFlipH = false;
        let isFlipV = false;
        let selectedFile = null;

        imgUpload.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (ev) => {
                    previewImg.src = ev.target.result;
                    previewImg.style.display = 'block';
                    placeholder.style.display = 'none';
                    downloadBtn.disabled = false;
                    resetControls();
                };
                reader.readAsDataURL(selectedFile);
            }
        });

        function resetControls() {
            currentRotation = 0;
            isFlipH = false;
            isFlipV = false;
            updatePreviewStyles();
            document.getElementById('flipH').classList.remove('active');
            document.getElementById('flipV').classList.remove('active');
        }

        function rotate(deg) {
            currentRotation = (currentRotation + deg) % 360;
            updatePreviewStyles();
        }

        function toggleFlip(dir) {
            if (dir === 'h') {
                isFlipH = !isFlipH;
                document.getElementById('flipH').classList.toggle('active');
            } else {
                isFlipV = !isFlipV;
                document.getElementById('flipV').classList.toggle('active');
            }
            updatePreviewStyles();
        }

        function updatePreviewStyles() {
            const scaleX = isFlipH ? -1 : 1;
            const scaleY = isFlipV ? -1 : 1;
            previewImg.style.transform = `rotate(${currentRotation}deg) scale(${scaleX}, ${scaleY})`;
        }

        downloadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            downloadBtn.textContent = '⏳ Processing...';
            downloadBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('rotation', currentRotation);
            formData.append('flip_h', isFlipH);
            formData.append('flip_v', isFlipV);

            try {
                const response = await fetch('/process-rotate-flip', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `processed_${selectedFile.name}`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                } else {
                    alert('Error processing image');
                }
            } catch (err) {
                console.error(err);
                alert('An error occurred');
            } finally {
                downloadBtn.textContent = '🚀 Process & Download';
                downloadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
