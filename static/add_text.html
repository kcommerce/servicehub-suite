<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Text to Image</title>
    <link rel="stylesheet" href="/static/css/style.css?v=1.3.0">
    <style>
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        main {
            flex: 1;
            display: flex;
            overflow: hidden;
            flex-direction: row;
        }
        .sidebar {
            width: 350px;
            
            
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
        }
        .canvas-container {
            flex: 1;
            
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2rem;
            overflow: auto;
            position: relative;
        }
        #canvas {
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: crosshair;
            display: block;
            transform-origin: top left;
        }
        .control-item {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            text-align: left;
        }
        .control-item label {
            font-weight: 600;
            font-size: 0.8rem;
            color: #2d3436;
        }
        .preset-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .preset-card {
            padding: 0.5rem;
            border: 1px solid #dfe6e9;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            text-align: center;
            
            transition: all 0.2s;
        }
        .preset-card:hover {
            border-color: var(--primary);
        }
        .preset-card.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .zoom-controls {
            display: flex;
            gap: 0.3rem;
        }
        .zoom-btn {
            flex: 1;
            padding: 0.4rem;
            border: 1px solid #dfe6e9;
            
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
        }
        input, select {
            padding: 0.5rem;
            border: 1px solid #dfe6e9;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <main>
        <div class="sidebar">
            <section class="upload-section">
                <label for="imgUpload" class="upload-btn">
                    <span>📁 Upload Image</span>
                    <input type="file" id="imgUpload" accept="image/*" hidden>
                </label>
            </section>

            <div class="control-item">
                <label>Zoom Level: <span id="zoomPercent">100</span>%</label>
                <div class="zoom-controls">
                    <button class="zoom-btn" onclick="adjustZoom(-0.1)">➖</button>
                    <button class="zoom-btn" onclick="adjustZoom(0.1)">➕</button>
                    <button class="zoom-btn" onclick="resetZoom()">🔄</button>
                </div>
            </div>

            <div class="control-item">
                <label>Text Content</label>
                <input type="text" id="textContent" value="Cool Text ✨">
            </div>

            <div class="control-item">
                <label>Text Effect Presets</label>
                <div class="preset-grid">
                    <div class="preset-card active" data-effect="none">None</div>
                    <div class="preset-card" data-effect="shadow">Soft Shadow</div>
                    <div class="preset-card" data-effect="bold_shadow">Hard Shadow</div>
                    <div class="preset-card" data-effect="outline">Thin Outline</div>
                    <div class="preset-card" data-effect="thick_outline">Thick Outline</div>
                    <div class="preset-card" data-effect="sticker">Sticker Style</div>
                    <div class="preset-card" data-effect="hollow">Hollow</div>
                    <div class="preset-card" data-effect="neon">Neon Glow</div>
                    <div class="preset-card" data-effect="retro">Retro 3D</div>
                    <div class="preset-card" data-effect="glow">Outer Glow</div>
                </div>
            </div>
            
            <div class="control-item">
                <label>Font Family</label>
                <select id="fontFamily">
                    <option value="Sarabun">Sarabun (Thai/Latin)</option>
                    <option value="Arial">Arial</option>
                    <option value="Impact">Impact</option>
                    <option value="Verdana">Verdana</option>
                    <option value="Times New Roman">Times New Roman</option>
                    <option value="Courier New">Courier New</option>
                </select>
            </div>

            <div class="control-item">
                <label>Font Size (px)</label>
                <input type="number" id="fontSize" value="80" min="10">
            </div>

            <div class="control-item">
                <label>Text Color</label>
                <div style="display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem;">
                    <input type="color" id="textColor" value="#ffffff" style="width: 50px; height: 40px; padding: 2px; border: 1px solid #dfe6e9; border-radius: 4px; cursor: pointer;">
                    <div id="textColorPreview" style="flex: 1; height: 40px; fff; border: 1px solid #dfe6e9; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; color: black;">rgb(255, 255, 255)</div>
                </div>
                <div id="textPresets" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px;"></div>
            </div>

            <div class="control-item">
                <label>Effect/Outline Color</label>
                <div style="display: flex; gap: 0.5rem; align-items: center; margin-bottom: 0.5rem;">
                    <input type="color" id="effectColor" value="#000000" style="width: 50px; height: 40px; padding: 2px; border: 1px solid #dfe6e9; border-radius: 4px; cursor: pointer;">
                    <div id="effectColorPreview" style="flex: 1; height: 40px; background: #000000; border: 1px solid #dfe6e9; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; color: white;">rgb(0, 0, 0)</div>
                </div>
                <div id="effectPresets" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px;"></div>
            </div>

            <section class="actions">
                <button id="downloadBtn" class="download-btn" disabled>🚀 Download Result</button>
            </section>
        </div>

        <div class="canvas-container">
            <canvas id="canvas"></canvas>
            <div id="no-image-msg" style="color: #adb5bd;">Upload an image to start</div>
        </div>
    </main>

    <script>
        const imgUpload = document.getElementById('imgUpload');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const downloadBtn = document.getElementById('downloadBtn');
        const noImageMsg = document.getElementById('no-image-msg');
        const zoomPercent = document.getElementById('zoomPercent');
        
        const textInput = document.getElementById('textContent');
        const fontSizeInput = document.getElementById('fontSize');
        const fontFamilySelect = document.getElementById('fontFamily');
        const colorInput = document.getElementById('textColor');
        const textColorPreview = document.getElementById('textColorPreview');
        const effectColorInput = document.getElementById('effectColor');
        const effectColorPreview = document.getElementById('effectColorPreview');
        const textPresetsGrid = document.getElementById('textPresets');
        const effectPresetsGrid = document.getElementById('effectPresets');

        const presets = [
            '#000000', '#555555', '#ffffff', '#e74c3c', '#e67e22', 
            '#f1c40f', '#2ecc71', '#1abc9c', '#3498db', '#9b59b6', 
            '#ecf0f1', '#d35400', '#c0392b', '#2980b9', '#8e44ad'
        ];

        function setupPresets(grid, input, preview) {
            presets.forEach(color => {
                const swatch = document.createElement('div');
                swatch.style.cssText = `height: 20px; background: ${color}; border: 1px solid #dfe6e9; border-radius: 4px; cursor: pointer;`;
                swatch.onclick = () => {
                    input.value = color;
                    updateColorUI(color, preview);
                    draw();
                };
                grid.appendChild(swatch);
            });
        }

        function updateColorUI(hex, preview) {
            preview.style.background = hex;
            const r = parseInt(hex.substring(1, 3), 16);
            const g = parseInt(hex.substring(3, 5), 16);
            const b = parseInt(hex.substring(5, 7), 16);
            preview.textContent = `rgb(${r}, ${g}, ${b})`;
            preview.style.color = (r*0.299 + g*0.587 + b*0.114) > 186 ? 'black' : 'white';
        }

        setupPresets(textPresetsGrid, colorInput, textColorPreview);
        setupPresets(effectPresetsGrid, effectColorInput, effectColorPreview);

        colorInput.addEventListener('input', (e) => {
            updateColorUI(e.target.value, textColorPreview);
            draw();
        });

        effectColorInput.addEventListener('input', (e) => {
            updateColorUI(e.target.value, effectColorPreview);
            draw();
        });

        const presetCards = document.querySelectorAll('.preset-card');

        let originalImage = null;
        let selectedFile = null;
        let textX = 0;
        let textY = 0;
        let isDragging = false;
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        let currentZoom = 1.0;
        let currentEffect = 'none';

        imgUpload.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (ev) => {
                    originalImage = new Image();
                    originalImage.onload = () => {
                        canvas.width = originalImage.width;
                        canvas.height = originalImage.height;
                        textX = canvas.width / 2;
                        textY = canvas.height / 2;
                        noImageMsg.style.display = 'none';
                        resetZoom();
                        draw();
                        downloadBtn.disabled = false;
                    };
                    originalImage.src = ev.target.result;
                };
                reader.readAsDataURL(selectedFile);
            }
        });

        presetCards.forEach(card => {
            card.addEventListener('click', () => {
                presetCards.forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                currentEffect = card.dataset.effect;
                draw();
            });
        });

        [textInput, fontSizeInput, fontFamilySelect, colorInput, effectColorInput].forEach(el => {
            el.addEventListener('input', draw);
        });

        function adjustZoom(delta) {
            currentZoom = Math.max(0.1, Math.min(5, currentZoom + delta));
            updateZoomUI();
        }

        function resetZoom() {
            if (!originalImage) return;
            const container = document.querySelector('.canvas-container');
            const ratio = (container.clientWidth - 100) / originalImage.width;
            currentZoom = Math.min(1.0, ratio);
            updateZoomUI();
        }

        function updateZoomUI() {
            canvas.style.width = (canvas.width * currentZoom) + 'px';
            canvas.style.height = (canvas.height * currentZoom) + 'px';
            zoomPercent.textContent = Math.round(currentZoom * 100);
        }

        function draw() {
            if (!originalImage) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(originalImage, 0, 0);
            
            const fontSize = fontSizeInput.value;
            const font = `${fontSize}px ${fontFamilySelect.value}`;
            const text = textInput.value;
            const color = colorInput.value;
            const effectColor = effectColorInput.value;

            ctx.font = font;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Effect rendering logic on canvas
            ctx.save();
            if (currentEffect === 'shadow') {
                ctx.shadowColor = effectColor;
                ctx.shadowBlur = 4;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;
            } else if (currentEffect === 'bold_shadow') {
                ctx.shadowColor = effectColor;
                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 4;
                ctx.shadowOffsetY = 4;
            } else if (currentEffect === 'outline' || currentEffect === 'thick_outline') {
                ctx.strokeStyle = effectColor;
                ctx.lineWidth = currentEffect === 'outline' ? 2 : 5;
                ctx.strokeText(text, textX, textY);
            } else if (currentEffect === 'sticker') {
                ctx.strokeStyle = effectColor;
                ctx.lineWidth = 10;
                ctx.strokeText(text, textX, textY);
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 10;
                ctx.shadowOffsetX = 5;
                ctx.shadowOffsetY = 5;
            } else if (currentEffect === 'hollow') {
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.strokeText(text, textX, textY);
            } else if (currentEffect === 'neon') {
                ctx.shadowColor = effectColor;
                ctx.shadowBlur = 15;
            } else if (currentEffect === 'retro') {
                ctx.fillStyle = '#ff0000';
                ctx.fillText(text, textX - 3, textY - 3);
                ctx.fillStyle = '#00ffff';
                ctx.fillText(text, textX + 3, textY + 3);
            } else if (currentEffect === 'glow') {
                ctx.shadowColor = effectColor;
                ctx.shadowBlur = 20;
                ctx.fillText(text, textX, textY);
                ctx.fillText(text, textX, textY);
            }
            
            if (currentEffect !== 'hollow') {
                ctx.fillStyle = color;
                ctx.fillText(text, textX, textY);
            }
            ctx.restore();
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
            
            const fontSize = parseInt(fontSizeInput.value);
            ctx.font = `${fontSize}px ${fontFamilySelect.value}`;
            const metrics = ctx.measureText(textInput.value);
            const w = metrics.width;
            const h = fontSize;
            
            if (mouseX >= textX - w/2 && mouseX <= textX + w/2 && 
                mouseY >= textY - h/2 && mouseY <= textY + h/2) {
                isDragging = true;
                dragOffsetX = mouseX - textX;
                dragOffsetY = mouseY - textY;
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
            textX = mouseX - dragOffsetX;
            textY = mouseY - dragOffsetY;
            draw();
        });

        window.addEventListener('mouseup', () => {isDragging = false;});

        downloadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            downloadBtn.textContent = '⏳ Processing...';
            downloadBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('text', textInput.value);
            formData.append('x', Math.round(textX));
            formData.append('y', Math.round(textY));
            formData.append('font_size', fontSizeInput.value);
            formData.append('color', colorInput.value);
            formData.append('effect_color', effectColorInput.value);
            formData.append('effect', currentEffect);
            formData.append('font_family', fontFamilySelect.value);

            try {
                const response = await fetch('/process-add-text', {
                    method: 'POST',
                    body: formData
                });
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `texted_${selectedFile.name}`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                } else {
                    alert('Error adding text to image');
                }
            } catch (err) {
                console.error(err);
                alert('An error occurred');
            } finally {
                downloadBtn.textContent = '🚀 Download Result';
                downloadBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
