<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ThaiEdit Pro | Universal Editor Suite</title>
    <link rel="stylesheet" type="text/css" href="/static/css/portal.css?v=1.0.8">
    <link rel="stylesheet" type="text/css" href="/static/css/style.css?v=1.0.8">
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3619728042544494" crossorigin="anonymous"></script>
</head>
<body>
    <div class="portal-container">
        <header class="top-frame">
            <div class="portal-logo">ThaiEdit Pro <span>🚀</span></div>
            
            <!-- Horizontal Ad Placement -->
            <div class="header-ad" style="flex: 1; max-width: 728px; height: 90px; margin: 0 2rem; display: flex; align-items: center; justify-content: center;">
                <ins class="adsbygoogle"
                     style="display:inline-block;width:728px;height:90px"
                     data-ad-client="ca-pub-3619728042544494"
                     data-ad-slot="4800209843"></ins>
                <script>
                     (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>

            <nav class="service-nav">
                <button onclick="loadService('/crop-service')" class="service-btn">
                    <span class="icon">✨</span> Crop Master
                </button>
                <button onclick="loadService('/pdf-compressor')" class="service-btn">
                    <span class="icon">📄</span> PDF Compressor
                </button>
                <button onclick="loadService('/merge-pdf')" class="service-btn">
                    <span class="icon">📑</span> Merge PDF
                </button>
                <button onclick="loadService('/edit-pdf')" class="service-btn">
                    <span class="icon">✍️</span> Edit PDF
                </button>
                <button onclick="loadService('/image-converter')" class="service-btn">
                    <span class="icon">🔄</span> Image Converter
                </button>
                <button onclick="loadService('/rotate-flip')" class="service-btn">
                    <span class="icon">🔄</span> Rotate/Flip
                </button>
                <button onclick="loadService('/design-tool')" class="service-btn">
                    <span class="icon">🎨</span> Design Tool
                </button>
                <button onclick="loadService('/legal')" class="service-btn">
                    <span class="icon">⚖️</span> Legal & Privacy
                </button>
                <button class="service-btn disabled" title="Coming Soon">
                    <span class="icon">📁</span> More Soon...
                </button>
            </nav>
        </header>
        
        <main class="bottom-frame">
            <iframe id="service-content" src="" frameborder="0"></iframe>
            <div id="welcome-message" class="welcome">
                <h2>Welcome to ThaiEdit Pro</h2>
                <p>Select a professional service from the top menu to get started.</p>
                
                <!-- Native Responsive Ad -->
                <div style="margin-top: 2rem; width: 100%; max-width: 600px; min-height: 280px; display: inline-block;">
                    <ins class="adsbygoogle"
                         style="display:block"
                         data-ad-client="ca-pub-3619728042544494"
                         data-ad-slot="3659486160"
                         data-ad-format="auto"
                         data-full-width-responsive="true"></ins>
                    <script>
                         (adsbygoogle = window.adsbygoogle || []).push({});
                    </script>
                </div>
            </div>
        </main>
    </div>

    <script>
        function loadService(url) {
            document.getElementById('welcome-message').style.display = 'none';
            const iframe = document.getElementById('service-content');
            iframe.style.display = 'block';
            iframe.src = url;
        }
    </script>
</body>
</html>
