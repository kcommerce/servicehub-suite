<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Image Converter</title>
    <link rel="stylesheet" href="/static/css/style.css?v=1.3.0">
    <style>
        .container { padding: 3rem; max-width: 700px; margin: auto; text-align: center; }
        .format-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 0.75rem; margin-top: 2rem; }
        .format-btn { padding: 0.8rem; border: 2px solid #eee; border-radius: 10px; cursor: pointer; font-weight: 700; transition: all 0.2s; background: white; font-size: 0.9rem; }
        .format-btn.active { border-color: var(--primary); background: rgba(108, 92, 231, 0.1); color: var(--primary); }
        .options { margin-top: 2rem; padding: 1.5rem; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .quality-slider { width: 100%; margin-top: 1rem; }
        .file-info { margin-top: 1rem; font-weight: 600; color: var(--primary); font-size: 0.9rem; }
        .hint-text { font-size: 0.75rem; color: #999; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <h1>🔄 Universal Image Converter</h1>
            <p>Professional grade conversion between modern and legacy image formats.</p>
            
            <section class="upload-section" style="margin-top: 2rem;">
                <label for="imgUpload" class="upload-btn">
                    <span>📁 Select Image File</span>
                    <input type="file" id="imgUpload" accept="image/*" hidden>
                </label>
                <div id="fileInfo" class="file-info"></div>
            </section>

            <h3 style="margin-top: 2rem; font-size: 1rem; color: #636e72;">Target Output Format:</h3>
            <div class="format-grid">
                <div id="btn-jpg" class="format-btn active" onclick="setFormat('jpg')">JPG</div>
                <div id="btn-png" class="format-btn" onclick="setFormat('png')">PNG</div>
                <div id="btn-webp" class="format-btn" onclick="setFormat('webp')">WebP</div>
                <div id="btn-bmp" class="format-btn" onclick="setFormat('bmp')">BMP</div>
                <div id="btn-tiff" class="format-btn" onclick="setFormat('tiff')">TIFF</div>
            </div>

            <div class="options" id="qualityPanel">
                <label style="font-weight: 600; font-size: 0.9rem;">Output Quality: <span id="qVal">85</span>%</label>
                <input type="range" id="qRange" class="quality-slider" min="10" max="100" value="85">
                <p class="hint-text">Adjust to balance between file size and image clarity.</p>
            </div>

            <section class="actions" style="margin-top: 2rem;">
                <button id="convertBtn" class="download-btn" disabled>🚀 Convert & Download</button>
            </section>

            <!-- Ad Container -->
            <div style="margin-top: 3rem; text-align: center;">
                <div style="display: inline-block; width: 336px; height: 280px;  border: 1px dashed #ccc; font-size: 0.7rem; color: #999; line-height: 280px;">
                    ADVERTISING (Rectangle 336x280)
                </div>
            </div>
        </div>
    </main>

    <script>
        let selectedFile = null;
        let targetFormat = 'jpg';

        const imgUpload = document.getElementById('imgUpload');
        const fileInfo = document.getElementById('fileInfo');
        const convertBtn = document.getElementById('convertBtn');
        const qRange = document.getElementById('qRange');
        const qVal = document.getElementById('qVal');
        const qualityPanel = document.getElementById('qualityPanel');

        function setFormat(fmt) {
            targetFormat = fmt;
            // Update UI buttons
            document.querySelectorAll('.format-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${fmt}`).classList.add('active');
            
            // Show/Hide quality panel (only for JPG and WebP)
            qualityPanel.style.display = (fmt === 'jpg' || fmt === 'webp') ? 'block' : 'none';
        }

        qRange.oninput = (e) => { qVal.textContent = e.target.value; };

        imgUpload.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                fileInfo.textContent = `File: ${selectedFile.name} (${(selectedFile.size / 1024).toFixed(1)} KB)`;
                convertBtn.disabled = false;
                
                // Smart suggestion
                const ext = selectedFile.name.split('.').pop().toLowerCase();
                if(ext === 'jpg' || ext === 'jpeg') setFormat('png');
                else setFormat('jpg');
            }
        });

        convertBtn.onclick = async () => {
            if (!selectedFile) return;
            convertBtn.textContent = '⏳ Processing...';
            convertBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('target_format', targetFormat);
            formData.append('quality', qRange.value);

            try {
                const res = await fetch('/convert-image', { method: 'POST', body: formData });
                if (res.ok) {
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    const name = selectedFile.name.split('.')[0];
                    a.download = `${name}.${targetFormat}`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                } else {
                    alert('Conversion failed. Format might not be supported.');
                }
            } catch (err) {
                console.error(err);
                alert('An error occurred during conversion.');
            } finally {
                convertBtn.textContent = '🚀 Convert & Download';
                convertBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
