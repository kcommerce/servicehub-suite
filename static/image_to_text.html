<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to Text (OCR) | ThaiEdit Pro</title>
    <link rel="stylesheet" href="/static/css/style.css?v=1.3.2">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.0/tesseract.min.js"></script>
    <style>
        body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        main { flex: 1; display: flex; overflow: hidden; }
        
        /* The .sidebar and .canvas-container inherit from style.css */
        
        #drop-zone {
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 12px;
            padding: 4rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            max-width: 600px;
            margin: auto;
            background: rgba(0,0,0,0.1);
            color: var(--text);
        }
        [data-theme="light"] #drop-zone {
            border-color: rgba(0,0,0,0.15);
            background: rgba(255,255,255,0.5);
        }
        
        #drop-zone:hover, #drop-zone.dragover {
            border-color: var(--primary);
            background: rgba(6, 182, 212, 0.1);
        }
        [data-theme="light"] #drop-zone:hover, [data-theme="light"] #drop-zone.dragover {
            background: rgba(14, 165, 233, 0.05);
        }

        #drop-zone .icon { font-size: 3rem; margin-bottom: 12px; }

        #preview-wrap {
            display: none;
            width: 100%;
            text-align: center;
            margin-bottom: 2rem;
        }
        #preview {
            max-width: 100%;
            max-height: 40vh;
            border-radius: 10px;
            object-fit: contain;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.1);
        }
        [data-theme="light"] #preview { border-color: rgba(0,0,0,0.1); }

        .control-item {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        .control-item label {
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        #progress-wrap { display: none; margin-top: 1rem; }
        #progress-bar-bg {
            background: rgba(255,255,255,0.1);
            border-radius: 99px;
            height: 8px;
            overflow: hidden;
            margin-top: 0.5rem;
        }
        [data-theme="light"] #progress-bar-bg { background: rgba(0,0,0,0.1); }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--gradient);
            border-radius: 99px;
            transition: width 0.2s;
        }
        
        #output-card {
            display: none;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        #output-text {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 1.5rem;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 15vh;
            max-height: 35vh;
            overflow-y: auto;
            text-align: left;
        }
        [data-theme="light"] #output-text {
            background: rgba(255,255,255,0.8);
            border-color: rgba(0,0,0,0.1);
            color: #1e293b;
        }
        
        #confidence {
            margin-top: 1rem;
            font-size: 0.85rem;
            opacity: 0.8;
            text-align: center;
        }
        
        .action-btns {
            display: flex;
            gap: 0.5rem;
        }
        .action-btn {
            padding: 0.5rem 1rem;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: inherit;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        [data-theme="light"] .action-btn {
            border-color: rgba(0,0,0,0.1);
            background: rgba(0,0,0,0.05);
        }
        .action-btn:hover { border-color: var(--primary); color: var(--primary); }

        .license-notice {
            font-size: 0.7rem;
            text-align: center;
            opacity: 0.6;
            margin-top: auto;
            padding-top: 1rem;
            line-height: 1.4;
        }
        .license-notice a { color: var(--primary); text-decoration: none; }
        .license-notice a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <main>
        <div class="sidebar">
            <h3>Image to Text (OCR)</h3>
            <p style="font-size: 0.85rem; opacity: 0.8; margin-bottom: 1rem;">100% client-side text extraction. No files are uploaded to our servers.</p>
            
            <section class="upload-section">
                <input type="file" id="file-input" accept="image/*" hidden />
                <button id="change-btn" class="upload-btn" onclick="document.getElementById('file-input').click()">
                    <span>🖼️ Choose Image</span>
                </button>
            </section>

            <div class="control-item" style="margin-top: 1rem;">
                <label for="lang-select">Language</label>
                <select id="lang-select">
                    <option value="eng">English</option>
                    <option value="tha">Thai</option>
                    <option value="jpn">Japanese</option>
                    <option value="chi_sim">Chinese (Simplified)</option>
                    <option value="chi_tra">Chinese (Traditional)</option>
                    <option value="kor">Korean</option>
                    <option value="fra">French</option>
                    <option value="deu">German</option>
                    <option value="spa">Spanish</option>
                    <option value="ara">Arabic</option>
                    <option value="hin">Hindi</option>
                    <option value="por">Portuguese</option>
                    <option value="rus">Russian</option>
                </select>
            </div>

            <section class="actions" style="margin-top: 1.5rem;">
                <button id="extract-btn" class="crop-btn" disabled onclick="runOCR()">Extract Text</button>
            </section>

            <div id="progress-wrap">
                <div id="progress-label" style="font-size: 0.85rem;">Initializing...</div>
                <div id="progress-bar-bg">
                    <div id="progress-bar"></div>
                </div>
            </div>

            <div class="license-notice">
                Powered by <a href="https://github.com/naptha/tesseract.js" target="_blank">Tesseract.js</a>.<br>
                Licensed under the Apache License 2.0.
            </div>
        </div>

        <div class="canvas-container">
            <div id="drop-zone" onclick="document.getElementById('file-input').click()">
                <div class="icon">📄</div>
                <h3>Drag & Drop Image Here</h3>
                <p style="margin-top: 0.5rem; opacity: 0.7;">Supported: PNG, JPG, WEBP, BMP</p>
            </div>

            <div id="preview-wrap">
                <img id="preview" alt="Preview" />
            </div>

            <div id="output-card">
                <div class="output-header">
                    <h3 style="margin: 0;">Extracted Text</h3>
                    <div class="action-btns">
                        <button class="action-btn" onclick="copyText()">📋 Copy text</button>
                        <button class="action-btn" onclick="downloadText()">⬇️ Save as .txt</button>
                        <button class="action-btn" onclick="clearOutput()">🗑️ Clear</button>
                    </div>
                </div>
                <div id="output-text"></div>
                <div id="confidence"></div>
            </div>
        </div>
    </main>

    <script>
        let currentFile = null;
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const previewWrap = document.getElementById('preview-wrap');
        const previewImg = document.getElementById('preview');
        const outputCard = document.getElementById('output-card');
        const extractBtn = document.getElementById('extract-btn');

        // Drag and Drop
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files[0] && e.dataTransfer.files[0].type.startsWith('image/')) {
                loadImage(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', e => {
            if (e.target.files[0]) loadImage(e.target.files[0]);
        });

        function loadImage(file) {
            currentFile = file;
            const url = URL.createObjectURL(file);
            previewImg.src = url;
            dropZone.style.display = 'none';
            previewWrap.style.display = 'block';
            extractBtn.disabled = false;
            clearOutput();
        }

        async function runOCR() {
            if (!currentFile) return;

            const lang = document.getElementById('lang-select').value;
            const progressWrap = document.getElementById('progress-wrap');
            const progressBar = document.getElementById('progress-bar');
            const progressLabel = document.getElementById('progress-label');

            extractBtn.disabled = true;
            progressWrap.style.display = 'block';
            outputCard.style.display = 'none';

            try {
                const result = await Tesseract.recognize(currentFile, lang, {
                    logger: m => {
                        if (m.status === 'recognizing text') {
                            const pct = Math.round(m.progress * 100);
                            progressBar.style.width = pct + '%';
                            progressLabel.textContent = `Recognizing text... ${pct}%`;
                        } else {
                            progressLabel.textContent = m.status.charAt(0).toUpperCase() + m.status.slice(1) + '...';
                        }
                    }
                });

                const text = result.data.text.trim();
                const confidence = result.data.confidence.toFixed(1);

                document.getElementById('output-text').textContent = text || '(No text detected)';
                document.getElementById('confidence').innerHTML = `Confidence: <strong>${confidence}%</strong> | Characters: <strong>${text.length}</strong>`;
                outputCard.style.display = 'block';

            } catch (err) {
                document.getElementById('output-text').textContent = 'Error: ' + err.message;
                outputCard.style.display = 'block';
            }

            progressWrap.style.display = 'none';
            progressBar.style.width = '0%';
            extractBtn.disabled = false;
        }

        function copyText() {
            const text = document.getElementById('output-text').textContent;
            navigator.clipboard.writeText(text).then(() => alert('Copied to clipboard!'));
        }

        function downloadText() {
            const text = document.getElementById('output-text').textContent;
            const blob = new Blob([text], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'extracted-text.txt';
            a.click();
        }

        function clearOutput() {
            outputCard.style.display = 'none';
            document.getElementById('output-text').textContent = '';
            document.getElementById('confidence').innerHTML = '';
        }
    </script>
</body>
</html>
