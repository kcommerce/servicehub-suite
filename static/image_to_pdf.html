<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to PDF | ThaiEdit Pro</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .container { padding: 3rem; max-width: 800px; margin: auto; text-align: center; }
        .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; margin-top: 2rem; text-align: left; }
        .image-card { position: relative; background: white; padding: 0.5rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 2px solid transparent; }
        .image-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 4px; }
        .order-badge { position: absolute; top: -10px; left: -10px; background: var(--primary); color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; }
        .remove-btn { position: absolute; top: 5px; right: 5px; background: rgba(231, 76, 60, 0.8); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px; }
        .hint { font-size: 0.8rem; color: #636e72; background: #e3f2fd; padding: 0.8rem; border-radius: 8px; border-left: 4px solid #2196f3; margin-top: 1rem; }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <h1>🖼️ Image to PDF</h1>
            <p>Convert your photos and scans into a professional PDF document.</p>
            
            <section class="upload-section" style="margin-top: 2rem;">
                <label for="imgUpload" class="upload-btn">
                    <span>📁 Select Images</span>
                    <input type="file" id="imgUpload" accept="image/*" multiple hidden>
                </label>
            </section>

            <div class="hint">💡 <b>Tip:</b> Files will be added to the PDF in the order you select them.</div>

            <div class="image-grid" id="imageGrid">
                <!-- Images populated by JS -->
            </div>

            <section class="actions" style="margin-top: 3rem;">
                <button id="convertBtn" class="download-btn" disabled>🚀 Create & Download PDF</button>
            </section>

            <!-- Ad Container -->
            <div style="margin-top: 3rem; text-align: center;">
                <ins class="adsbygoogle" style="display:inline-block;width:336px;height:280px" data-ad-client="ca-pub-3619728042544494" data-ad-slot="3659486160"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>
        </div>
    </main>

    <script>
        const imgUpload = document.getElementById('imgUpload');
        const imageGrid = document.getElementById('imageGrid');
        const convertBtn = document.getElementById('convertBtn');
        
        let selectedFiles = [];

        imgUpload.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    selectedFiles.push({ file: file, preview: ev.target.result });
                    renderGrid();
                };
                reader.readAsDataURL(file);
            });
        });

        function renderGrid() {
            imageGrid.innerHTML = '';
            selectedFiles.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.innerHTML = `
                    <div class="order-badge">${index + 1}</div>
                    <button class="remove-btn" onclick="removeImage(${index})">&times;</button>
                    <img src="${item.preview}">
                    <div style="font-size: 0.6rem; color: #999; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${item.file.name}</div>
                `;
                imageGrid.appendChild(card);
            });
            convertBtn.disabled = selectedFiles.length === 0;
        }

        function removeImage(index) {
            selectedFiles.splice(index, 1);
            renderGrid();
        }

        convertBtn.addEventListener('click', async () => {
            convertBtn.textContent = '⏳ Processing...';
            convertBtn.disabled = true;

            const formData = new FormData();
            selectedFiles.forEach(item => {
                formData.append('files', item.file);
            });

            try {
                const response = await fetch('/process-image-to-pdf', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'images_to_document.pdf';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                } else {
                    alert('Conversion failed.');
                }
            } catch (err) {
                console.error(err);
                alert('An error occurred.');
            } finally {
                convertBtn.textContent = '🚀 Create & Download PDF';
                convertBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
