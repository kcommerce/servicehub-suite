<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Editor | ThaiEdit Pro</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        main { flex: 1; display: flex; overflow: hidden; }
        .sidebar { width: 350px; background: #fff; border-right: 1px solid #eee; padding: 1.2rem; display: flex; flex-direction: column; gap: 1rem; overflow-y: auto; }
        .canvas-container-outer { flex: 1; background: #e9ecef; display: flex; align-items: center; justify-content: center; padding: 2rem; overflow: auto; position: relative; }
        
        .tool-group { display: flex; flex-direction: column; gap: 0.5rem; background: #f8f9fa; padding: 1rem; border-radius: 10px; }
        .tool-label { font-size: 0.75rem; font-weight: bold; color: #636e72; text-transform: uppercase; letter-spacing: 1px; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.4rem; }
        .icon-btn { padding: 0.6rem; border: 1px solid #ddd; background: white; border-radius: 8px; cursor: pointer; font-size: 1.1rem; transition: 0.2s; }
        .icon-btn:hover { border-color: var(--primary); background: rgba(108, 92, 231, 0.05); }
        .icon-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .control-item { display: flex; flex-direction: column; gap: 0.3rem; }
        .control-item label { font-weight: 600; font-size: 0.8rem; color: #2d3436; }
        input[type="range"] { width: 100%; cursor: pointer; }
        
        .hint { font-size: 0.75rem; color: #636e72; background: #fff9db; padding: 0.8rem; border-radius: 8px; border-left: 4px solid #fcc419; }
    </style>
</head>
<body>
    <main>
        <div class="sidebar">
            <section class="upload-section">
                <label for="imgUpload" class="upload-btn"><span>📁 Open Image</span><input type="file" id="imgUpload" accept="image/*" hidden></label>
            </section>

            <div class="tool-group">
                <span class="tool-label">Basic Tools</span>
                <div class="btn-grid">
                    <button class="icon-btn" onclick="setTool('select')" id="btn-select" title="Select">🖱️</button>
                    <button class="icon-btn" onclick="setTool('brush')" id="btn-brush" title="Brush">🖌️</button>
                    <button class="icon-btn" onclick="deleteSelected()" title="Delete">🗑️</button>
                </div>
            </div>

            <div class="tool-group">
                <span class="tool-label">Shapes & Text</span>
                <div class="btn-grid">
                    <button class="icon-btn" onclick="addShape('rect')" title="Rectangle">⬛</button>
                    <button class="icon-btn" onclick="addShape('circle')" title="Circle">⚪</button>
                    <button class="icon-btn" onclick="addText()" title="Add Text">✍️</button>
                </div>
            </div>

            <div class="control-item">
                <label>Color</label>
                <input type="color" id="mainColor" value="#6c5ce7" style="width:100%; height:40px; border-radius:8px; cursor:pointer; border:1px solid #ddd; padding:2px;">
            </div>

            <div class="control-item" id="brushControls" style="display:none;">
                <label>Brush Size: <span id="brushSizeVal">5</span>px</label>
                <input type="range" id="brushSize" min="1" max="50" value="5">
            </div>

            <div class="hint">💡 <b>Tips:</b> Use Brush to draw freely. Click shapes to resize or rotate. Double-click text to edit.</div>

            <section class="actions">
                <button id="downloadBtn" class="download-btn" disabled>🚀 Export Image</button>
            </section>

            <!-- Sidebar Ad -->
            <div style="margin-top: auto; padding-top: 1rem; text-align: center;">
                <ins class="adsbygoogle" style="display:inline-block;width:300px;height:250px" data-ad-client="ca-pub-3619728042544494" data-ad-slot="1223926916"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>
        </div>

        <div class="canvas-container-outer">
            <canvas id="editor-canvas"></canvas>
            <div id="no-img-msg" style="color: #adb5bd; text-align: center; position: absolute;">
                <h2>Image Editor</h2>
                <p>Open an image or start drawing</p>
            </div>
        </div>
    </main>

    <script>
        const canvas = new fabric.Canvas('editor-canvas');
        const imgUpload = document.getElementById('imgUpload');
        const downloadBtn = document.getElementById('downloadBtn');
        const mainColor = document.getElementById('mainColor');
        const brushSize = document.getElementById('brushSize');
        const brushControls = document.getElementById('brushControls');

        function initCanvasSize() {
            const container = document.querySelector('.canvas-container-outer');
            canvas.setWidth(container.clientWidth - 100);
            canvas.setHeight(container.clientHeight - 100);
            canvas.renderAll();
        }

        window.addEventListener('resize', initCanvasSize);
        initCanvasSize();

        imgUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (f) => {
                fabric.Image.fromURL(f.target.result, (img) => {
                    img.scaleToWidth(canvas.width * 0.8);
                    canvas.add(img);
                    canvas.centerObject(img);
                    canvas.renderAll();
                    document.getElementById('no-img-msg').style.display = 'none';
                    downloadBtn.disabled = false;
                });
            };
            reader.readAsDataURL(file);
        });

        function setTool(tool) {
            document.querySelectorAll('.icon-btn').forEach(b => b.classList.remove('active'));
            if (tool === 'brush') {
                canvas.isDrawingMode = true;
                canvas.freeDrawingBrush.color = mainColor.value;
                canvas.freeDrawingBrush.width = parseInt(brushSize.value);
                brushControls.style.display = 'block';
                document.getElementById('btn-brush').classList.add('active');
            } else {
                canvas.isDrawingMode = false;
                brushControls.style.display = 'none';
                document.getElementById('btn-select').classList.add('active');
            }
        }

        function addShape(type) {
            let shape;
            if (type === 'rect') {
                shape = new fabric.Rect({ width: 100, height: 100, fill: mainColor.value, left: 100, top: 100 });
            } else {
                shape = new fabric.Circle({ radius: 50, fill: mainColor.value, left: 100, top: 100 });
            }
            canvas.add(shape);
            setTool('select');
            downloadBtn.disabled = false;
        }

        function addText() {
            const text = new fabric.IText('Double click to edit', { left: 100, top: 100, fill: mainColor.value, fontFamily: 'Sarabun' });
            canvas.add(text);
            setTool('select');
            downloadBtn.disabled = false;
        }

        function deleteSelected() {
            const activeObjects = canvas.getActiveObjects();
            canvas.discardActiveObject();
            activeObjects.forEach(obj => canvas.remove(obj));
        }

        mainColor.oninput = (e) => {
            const val = e.target.value;
            if (canvas.isDrawingMode) canvas.freeDrawingBrush.color = val;
            const active = canvas.getActiveObject();
            if (active) {
                if (active.type === 'activeSelection') {
                    active.forEachObject(o => o.set('fill', val));
                } else {
                    active.set('fill', val);
                }
                canvas.renderAll();
            }
        };

        brushSize.oninput = (e) => {
            const val = parseInt(e.target.value);
            document.getElementById('brushSizeVal').textContent = val;
            canvas.freeDrawingBrush.width = val;
        };

        downloadBtn.onclick = () => {
            const dataURL = canvas.toDataURL({ format: 'png', quality: 1.0 });
            const a = document.createElement('a');
            a.href = dataURL;
            a.download = 'edited_image.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        // Initial Tool
        setTool('select');
    </script>
</body>
</html>
