<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Compressor Service</title>
    <link rel="stylesheet" href="/static/css/style.css?v=1.3.0">
    <style>
        .compressor-container {
            padding: 3rem;
            max-width: 600px;
            margin: auto;
            text-align: center;
        }
        .options-group {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
        }
        .option-card {
            padding: 1rem;
            border: 2px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            width: 120px;
        }
        .option-card.active {
            border-color: var(--primary);
            background: rgba(108, 92, 231, 0.1);
        }
        .file-info {
            margin-top: 1rem;
            font-weight: 600;
            color: var(--primary);
        }
    </style>
</head>
<body>
    <main>
        <div class="compressor-container">
            <h1>📄 PDF Compressor</h1>
            <p>Reduce your PDF file size while keeping quality.</p>
            
            <section class="upload-section" style="margin-top: 2rem;">
                <label for="pdfUpload" class="upload-btn">
                    <span>📁 Upload PDF</span>
                    <input type="file" id="pdfUpload" accept=".pdf" hidden>
                </label>
                <div id="fileInfo" class="file-info"></div>
            </section>

            <section class="options-group">
                <div class="option-card active" data-level="low">
                    <h4>Low</h4>
                    <small>Best Quality</small>
                </div>
                <div class="option-card" data-level="medium">
                    <h4>Medium</h4>
                    <small>Balanced</small>
                </div>
                <div class="option-card" data-level="high">
                    <h4>High</h4>
                    <small>Smallest Size</small>
                </div>
            </section>

            <section class="actions" style="margin-top: 2rem;">
                <button id="compressBtn" class="download-btn" disabled>⚡ Compress & Download</button>
            </section>

            <!-- Ad Container -->
            <div style="margin-top: 3rem; text-align: center;">
                <div style="display: inline-block; width: 336px; height: 280px;  border: 1px dashed #ccc; font-size: 0.7rem; color: #999; line-height: 280px;">
                    ADVERTISING (Rectangle 336x280)
                </div>
            </div>
        </div>
    </main>

    <script>
        const pdfUpload = document.getElementById('pdfUpload');
        const fileInfo = document.getElementById('fileInfo');
        const compressBtn = document.getElementById('compressBtn');
        const options = document.querySelectorAll('.option-card');
        
        let selectedFile = null;
        let selectedLevel = 'low';

        options.forEach(opt => {
            opt.addEventListener('click', () => {
                options.forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                selectedLevel = opt.dataset.level;
            });
        });

        pdfUpload.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                fileInfo.textContent = `Selected: ${selectedFile.name} (${(selectedFile.size / 1024 / 1024).toFixed(2)} MB)`;
                compressBtn.disabled = false;
            }
        });

        compressBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            compressBtn.textContent = '⏳ Compressing...';
            compressBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('compression_level', selectedLevel);

            try {
                const response = await fetch('/compress-pdf', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `compressed_${selectedFile.name}`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                } else {
                    alert('Error compressing PDF');
                }
            } catch (err) {
                console.error(err);
                alert('An error occurred');
            } finally {
                compressBtn.textContent = '⚡ Compress & Download';
                compressBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
