<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text & Sticker Designer</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        main { flex: 1; display: flex; overflow: hidden; }
        .sidebar {
            width: 380px; background: #fff; border-right: 1px solid #eee;
            padding: 1.2rem; display: flex; flex-direction: column; gap: 1rem; overflow-y: auto;
        }
        .canvas-container {
            flex: 1; background: #e9ecef; display: flex; align-items: flex-start;
            justify-content: center; padding: 2rem; overflow: auto; position: relative;
        }
        #canvas { background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: crosshair; transform-origin: top left; }
        
        .tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 1rem; }
        .tab { flex: 1; padding: 0.8rem; text-align: center; cursor: pointer; font-weight: 600; color: #636e72; transition: all 0.2s; }
        .tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); background: rgba(108, 92, 231, 0.05); }
        
        .tool-panel { display: none; flex-direction: column; gap: 1rem; }
        .tool-panel.active { display: flex; }

        .sticker-gallery { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.4rem; }
        .sticker-item { padding: 0.3rem; border: 1px solid #eee; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .sticker-item:hover { border-color: var(--primary); }
        .sticker-item img { width: 100%; height: auto; display: block; }

        .control-item { display: flex; flex-direction: column; gap: 0.3rem; }
        .control-item label { font-weight: 600; font-size: 0.8rem; color: #2d3436; }
        input, select { padding: 0.5rem; border: 1px solid #dfe6e9; border-radius: 6px; }
        
        .preset-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; }
        .preset-card { padding: 0.4rem; border: 1px solid #eee; border-radius: 4px; cursor: pointer; font-size: 0.7rem; text-align: center; background: #f8f9fa; }
        .preset-card.active { background: var(--primary); color: white; }

        .color-row { display: flex; gap: 0.5rem; align-items: center; }
        .color-box { flex: 1; height: 35px; border-radius: 4px; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: bold; cursor: pointer; }
        .color-box.active-target { border: 2px solid var(--primary); box-shadow: 0 0 8px rgba(108, 92, 231, 0.3); }
        .color-presets { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; margin-top: 4px; }
        .swatch { height: 18px; border-radius: 3px; border: 1px solid #eee; cursor: pointer; }

        .layer-item { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem; background: #f8f9fa; border-radius: 6px; font-size: 0.8rem; }
        .btn-del { color: #e74c3c; cursor: pointer; font-weight: bold; }

        .hint {
            font-size: 0.8rem; color: #636e72; background: #fff9db;
            padding: 0.8rem; border-radius: 8px; border-left: 4px solid #fcc419;
        }
    </style>
</head>
<body>
    <main>
        <div class="sidebar">
            <section class="upload-section">
                <label for="imgUpload" class="upload-btn">
                    <span>📁 Upload Image</span>
                    <input type="file" id="imgUpload" accept="image/*" hidden>
                </label>
            </section>

            <div class="control-item">
                <label>Zoom: <span id="zoomPercent">100</span>%</label>
                <div style="display:flex; gap:4px;">
                    <button onclick="adjustZoom(-0.1)" style="flex:1; padding:4px;">➖</button>
                    <button onclick="adjustZoom(0.1)" style="flex:1; padding:4px;">➕</button>
                    <button onclick="resetZoom()" style="flex:1; padding:4px;">🔄 Reset</button>
                </div>
            </div>

            <div class="tabs">
                <div class="tab active" onclick="switchTab('text')">✍️ Text</div>
                <div class="tab" onclick="switchTab('stickers')">🎨 Stickers</div>
                <div class="tab" onclick="switchTab('layers')">📜 Layers</div>
            </div>

            <!-- TEXT PANEL -->
            <div id="text-panel" class="tool-panel active">
                <div class="control-item">
                    <label>Text Content</label>
                    <input type="text" id="textContent" value="New Text">
                    <button class="preset-btn" onclick="addTextLayer()" style="margin-top:4px;">➕ Add Text Layer</button>
                </div>
                <div class="control-item">
                    <label>Effect</label>
                    <div class="preset-grid" id="effectGrid">
                        <div class="preset-card active" data-val="none">None</div>
                        <div class="preset-card" data-val="shadow">Shadow</div>
                        <div class="preset-card" data-val="outline">Outline</div>
                        <div class="preset-card" data-val="neon">Neon</div>
                        <div class="preset-card" data-val="sticker">Sticker</div>
                        <div class="preset-card" data-val="glow">Glow</div>
                    </div>
                </div>
                <div class="control-item">
                    <label>Colors (Click box to select target)</label>
                    <div class="color-row">
                        <input type="color" id="color1" value="#ffffff" style="width:40px;">
                        <div id="p1" class="color-box active-target" onclick="setActiveColorTarget(1)" style="background:#ffffff; color:black;">Text</div>
                        <input type="color" id="color2" value="#000000" style="width:40px;">
                        <div id="p2" class="color-box" onclick="setActiveColorTarget(2)" style="background:#000000; color:white;">Effect</div>
                    </div>
                    <div class="color-presets" id="sharedPresets"></div>
                </div>
                <div class="control-item">
                    <label>Default Size: <span id="sizeVal">60</span>px</label>
                    <input type="range" id="fontSize" min="10" max="300" value="60">
                </div>
            </div>

            <!-- STICKER PANEL -->
            <div id="stickers-panel" class="tool-panel">
                <div class="sticker-gallery" id="stickerGallery"></div>
            </div>

            <!-- LAYERS PANEL -->
            <div id="layers-panel" class="tool-panel">
                <div id="layerList" style="display:flex; flex-direction:column; gap:5px;"></div>
                <button onclick="activeLayers = []; draw(); renderLayerList();" style="margin-top:10px;">Clear All</button>
            </div>

            <div class="hint">
                💡 <b>Resize Guide:</b><br>
                Drag the <b style="color:var(--primary)">purple dot</b> at the bottom-right of any object to resize it.
            </div>

            <section class="actions">
                <button id="downloadBtn" class="download-btn" disabled>🚀 Download Result</button>
            </section>
        </div>

        <div class="canvas-container">
            <canvas id="canvas"></canvas>
            <div id="no-img" style="color:#adb5bd; margin-top:10rem;">Upload an image to start designing</div>
        </div>
    </main>

    <script>
        const stickersList = [
            'hello', 'good_bye', 'hbd', 'wow', 'love',
            'yes', 'no', 'great', 'lol', 'omg', 'success',
            'party', 'chill', 'cute', 'bff', 'lucky',
            'ouch', 'done',
            'heart_red', 'laugh_face', 'star_gold', 'fire_hot', 'thumbs_up_gold', 'cool_shades', 'rocket_ship', 'party_popper',
            'grinning_face', 'winking_face', 'heart_eyes', 'partying_face', 'thinking_face', 'mind_blown', 'sleepy_face', 'sweat_smile', 
            'zany_face', 'shushing_face', 'clapping_hands', 'victory_hand', 'crown_gold', 'trophy_gold', 'money_bag', 'gift_box', 
            'balloon_red', 'pizza_slice', 'burger_food', 'cake_birthday', 'coffee_cup', 'beer_mug', 'sun_bright', 'moon_full', 
            'sparkles_gold', 'rainbow_arc', 'cloud_rain', 'cat_face', 'dog_face', 'panda_face', 'lion_face', 'unicorn_face', 
            'airplane_fly', 'car_red', 'camera_pic', 'music_notes',
            // New Set 3
            'alien_3d', 'ghost_3d', 'robot_3d', 'diamond_3d', 'fire_extinguisher', 
            'magic_wand', 'money_wings', 'pill_3d', 'shield_3d'
        ];

        const colorPresets = [
            '#000000', '#555555', '#ffffff', '#e74c3c', '#e67e22', 
            '#f1c40f', '#2ecc71', '#1abc9c', '#3498db', '#9b59b6',
            '#34495e', '#16a085', '#27ae60', '#2980b9', '#8e44ad',
            '#f39c12', '#d35400', '#c0392b', '#7f8c8d', '#bdc3c7',
            '#ff9ff3', '#feca57', '#ff6b6b', '#48dbfb', '#1dd1a1',
            '#00d2d3', '#54a0ff', '#5f27cd', '#c8d6e5', '#222f3e',
            '#f368e0', '#ff9f43', '#ee5253', '#10ac84', '#01a3a4'
        ];

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const imgUpload = document.getElementById('imgUpload');
        const downloadBtn = document.getElementById('downloadBtn');
        
        let originalImage = null, selectedFile = null;
        let activeLayers = [], draggingLayer = null, resizingLayer = null;
        let dragOffsetX = 0, dragOffsetY = 0, currentZoom = 1.0;
        let startResizeW = 0, startResizeH = 0, startResizeY = 0, startFontSize = 0;
        let currentEffect = 'none';
        let activeColorTarget = 1; // 1 for Text, 2 for Effect

        function setActiveColorTarget(target) {
            activeColorTarget = target;
            document.getElementById('p1').classList.toggle('active-target', target === 1);
            document.getElementById('p2').classList.toggle('active-target', target === 2);
        }

        // Init Gallery
        const gallery = document.getElementById('stickerGallery');
        stickersList.forEach(s => {
            const div = document.createElement('div');
            div.className = 'sticker-item';
            div.innerHTML = `<img src="/static/stickers/${s}.png">`;
            div.onclick = () => addStickerLayer(s);
            gallery.appendChild(div);
        });

        // Init Presets
        const presetGrid = document.getElementById('sharedPresets');
        colorPresets.forEach(c => {
            const s = document.createElement('div');
            s.className = 'swatch';
            s.style.background = c;
            s.onclick = () => {
                const targetInput = document.getElementById('color' + activeColorTarget);
                targetInput.value = c;
                updateColorUI();
                draw();
            };
            presetGrid.appendChild(s);
        });

        function switchTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tool-panel').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(id + '-panel').classList.add('active');
            if(id === 'layers') renderLayerList();
        }

        imgUpload.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (ev) => {
                    originalImage = new Image();
                    originalImage.onload = () => {
                        canvas.width = originalImage.width;
                        canvas.height = originalImage.height;
                        document.getElementById('no-img').style.display = 'none';
                        resetZoom();
                        draw();
                        downloadBtn.disabled = false;
                    };
                    originalImage.src = ev.target.result;
                };
                reader.readAsDataURL(selectedFile);
            }
        });

        function addTextLayer() {
            if(!originalImage) return;
            const textVal = document.getElementById('textContent').value;
            const sizeVal = parseInt(document.getElementById('fontSize').value);
            const colorVal = document.getElementById('color1').value;
            const effectColorVal = document.getElementById('color2').value;
            
            activeLayers.push({
                type: 'text',
                text: textVal,
                font_size: sizeVal,
                color: colorVal,
                effect_color: effectColorVal,
                effect: currentEffect,
                x: canvas.width / 2,
                y: canvas.height / 2
            });
            draw();
        }

        function addStickerLayer(name) {
            if(!originalImage) return;
            const sImg = new Image();
            sImg.src = `/static/stickers/${name}.png`;
            sImg.onload = () => {
                activeLayers.push({
                    type: 'sticker',
                    name: name,
                    img: sImg,
                    orig_w: sImg.width,
                    orig_h: sImg.height,
                    x: canvas.width / 2 - sImg.width / 2,
                    y: canvas.height / 2 - sImg.height / 2,
                    w: sImg.width,
                    h: sImg.height
                });
                draw();
            };
        }

        function draw() {
            if(!originalImage) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(originalImage, 0, 0);
            
            activeLayers.forEach(l => {
                let rx, ry; // Resize handle positions
                if(l.type === 'sticker') {
                    ctx.drawImage(l.img, l.x, l.y, l.w, l.h);
                    rx = l.x + l.w; ry = l.y + l.h;
                } else {
                    ctx.save();
                    ctx.font = `${l.font_size}px Sarabun`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    
                    const x = l.x, y = l.y, txt = l.text, ec = l.effect_color;

                    if(l.effect === 'shadow') { 
                        ctx.shadowColor = ec; ctx.shadowBlur = 5; ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 3; 
                    } else if(l.effect === 'outline') { 
                        ctx.strokeStyle = ec; ctx.lineWidth = l.font_size * 0.1; ctx.strokeText(txt, x, y); 
                    } else if(l.effect === 'neon') {
                        ctx.shadowColor = ec; ctx.shadowBlur = 15;
                        ctx.strokeStyle = ec; ctx.lineWidth = 2; ctx.strokeText(txt, x, y);
                    } else if(l.effect === 'sticker') {
                        ctx.strokeStyle = ec; ctx.lineWidth = l.font_size * 0.2; ctx.strokeText(txt, x, y);
                        ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 10;
                    } else if(l.effect === 'glow') {
                        ctx.shadowColor = ec; ctx.shadowBlur = 20;
                        ctx.fillText(txt, x, y);
                    }
                    
                    ctx.fillStyle = l.color;
                    ctx.fillText(txt, x, y);
                    ctx.restore();
                    
                    const tw = ctx.measureText(l.text).width;
                    rx = l.x + tw/2 + 10; ry = l.y + l.font_size/2 + 10;
                }

                // Draw Handle
                ctx.beginPath();
                ctx.arc(rx, ry, 10, 0, Math.PI*2);
                ctx.fillStyle = '#6c5ce7';
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
            const my = (e.clientY - rect.top) * (canvas.height / rect.height);

            for(let i = activeLayers.length - 1; i >= 0; i--) {
                const l = activeLayers[i];
                let rx, ry, w, h;
                if(l.type === 'sticker') {
                    rx = l.x + l.w; ry = l.y + l.h; w = l.w; h = l.h;
                } else {
                    ctx.font = `${l.font_size}px Sarabun`;
                    w = ctx.measureText(l.text).width; h = l.font_size;
                    rx = l.x + w/2 + 10; ry = l.y + h/2 + 10;
                }

                // Check Handle Hit
                if(Math.sqrt((mx - rx)**2 + (my - ry)**2) < 15) {
                    resizingLayer = l;
                    startResizeW = w; startResizeH = h;
                    startResizeY = my;
                    startFontSize = l.font_size || 0;
                    return;
                }

                // Check Move Hit
                let hit = false;
                if(l.type === 'sticker') {
                    if(mx >= l.x && mx <= l.x + l.w && my >= l.y && my <= l.y + l.h) hit = true;
                } else {
                    if(mx >= l.x - w/2 && mx <= l.x + w/2 && my >= l.y - h/2 && my <= l.y + h/2) hit = true;
                }

                if(hit) {
                    draggingLayer = l;
                    dragOffsetX = mx - l.x; dragOffsetY = my - l.y;
                    activeLayers.splice(i, 1); activeLayers.push(l);
                    draw(); return;
                }
            }
        });

        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
            const my = (e.clientY - rect.top) * (canvas.height / rect.height);

            if(draggingLayer) {
                draggingLayer.x = mx - dragOffsetX;
                draggingLayer.y = my - dragOffsetY;
                draw();
            } else if(resizingLayer) {
                const diff = my - startResizeY;
                if(resizingLayer.type === 'sticker') {
                    const ratio = resizingLayer.orig_w / resizingLayer.orig_h;
                    resizingLayer.h = Math.max(20, startResizeH + diff);
                    resizingLayer.w = resizingLayer.h * ratio;
                } else {
                    resizingLayer.font_size = Math.max(10, startFontSize + diff);
                }
                draw();
            }
        });

        window.addEventListener('mouseup', () => { draggingLayer = null; resizingLayer = null; });

        function updateColorUI() {
            const c1 = document.getElementById('color1').value;
            const p1 = document.getElementById('p1');
            p1.style.background = c1;
            const r1 = parseInt(c1.substring(1,3), 16), g1 = parseInt(c1.substring(3,5), 16), b1 = parseInt(c1.substring(5,7), 16);
            p1.style.color = (r1*0.299 + g1*0.587 + b1*0.114) > 186 ? 'black' : 'white';

            const c2 = document.getElementById('color2').value;
            const p2 = document.getElementById('p2');
            p2.style.background = c2;
            const r2 = parseInt(c2.substring(1,3), 16), g2 = parseInt(c2.substring(3,5), 16), b2 = parseInt(c2.substring(5,7), 16);
            p2.style.color = (r2*0.299 + g2*0.587 + b2*0.114) > 186 ? 'black' : 'white';
        }

        document.getElementById('color1').oninput = () => { updateColorUI(); draw(); };
        document.getElementById('color2').oninput = () => { updateColorUI(); draw(); };
        document.getElementById('fontSize').oninput = (e) => { document.getElementById('sizeVal').textContent = e.target.value; };

        document.querySelectorAll('#effectGrid .preset-card').forEach(c => {
            c.onclick = () => {
                document.querySelectorAll('#effectGrid .preset-card').forEach(pc => pc.classList.remove('active'));
                c.classList.add('active');
                currentEffect = c.dataset.val;
            }
        });

        function renderLayerList() {
            const list = document.getElementById('layerList');
            list.innerHTML = '';
            activeLayers.forEach((l, i) => {
                const div = document.createElement('div');
                div.className = 'layer-item';
                div.innerHTML = `<span>${l.type === 'text' ? 'Text: ' + l.text : 'Sticker: ' + l.name}</span> <span class="btn-del" onclick="activeLayers.splice(${i},1); draw(); renderLayerList();">Remove</span>`;
                list.appendChild(div);
            });
        }

        function adjustZoom(d) { currentZoom = Math.max(0.1, Math.min(5, currentZoom + d)); updateZoom(); }
        function resetZoom() {
            if(!originalImage) return;
            currentZoom = Math.min(1.0, (document.querySelector('.canvas-container').clientWidth - 100) / originalImage.width);
            updateZoom();
        }
        function updateZoom() {
            canvas.style.width = (canvas.width * currentZoom) + 'px';
            canvas.style.height = (canvas.height * currentZoom) + 'px';
            document.getElementById('zoomPercent').textContent = Math.round(currentZoom * 100);
        }

        downloadBtn.onclick = async () => {
            downloadBtn.textContent = '⏳ Processing...';
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('layers_json', JSON.stringify(activeLayers.map(l => ({...l, img: undefined}))));
            try {
                const res = await fetch('/process-composite', { method: 'POST', body: formData });
                if(res.ok) {
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = 'design.png'; a.click();
                }
            } catch(e) { alert('Error'); } finally { downloadBtn.textContent = '🚀 Download Result'; }
        }
    </script>
</body>
</html>
