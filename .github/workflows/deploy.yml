name: Deploy to EC2

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/servicehub-suite
            git fetch --all
            git checkout main
            git reset --hard origin/main
            
            # Recreate venv if broken or missing to avoid path errors
            if [ ! -d "venv" ]; then
                python3 -m venv venv
            fi
            
            source venv/bin/activate
            # Ensure pip is up to date and install requirements
            python3 -m pip install --upgrade pip
            python3 -m pip install -r requirements.txt
            
            # Restart the systemd service
            sudo systemctl restart thaiedit
            sudo systemctl status thaiedit --no-pager
