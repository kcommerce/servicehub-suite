<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HAR Sequence Explorer</title>

<script src="https://cdn.jsdelivr.net/npm/mermaid@9.4.3/dist/mermaid.min.js"></script>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
margin:0;
display:flex;
height:100vh;
background:#f0f2f5;
}

#left{
flex:1;
overflow:auto;
padding:20px;
}

#right{
width:500px;
background:white;
border-left:1px solid #ddd;
padding:20px;
overflow:auto;
}

pre{
background:#272822;
color:#f8f8f2;
padding:10px;
border-radius:5px;
font-size:12px;
white-space:pre-wrap;
word-break:break-all;
}

.badge{
background:#1a73e8;
color:white;
padding:4px 10px;
border-radius:12px;
font-size:12px;
font-weight:bold;
}

.mermaid{
background:white;
padding:20px;
border-radius:8px;
min-width:800px;
}

h3{
border-bottom:2px solid #1a73e8;
padding-bottom:6px;
}

input{
margin-bottom:10px;
}

</style>
</head>

<body>

<div id="left">

<h2>HAR Sequence Diagram</h2>

<input type="file" id="harFile" accept=".har">

<div id="stats"></div>

<pre class="mermaid" id="diagram"></pre>

</div>

<div id="right">

<h3>Transaction Inspector</h3>

<p id="placeholder">Select a request arrow</p>

<div id="details" style="display:none">

<h4>Request</h4>

<p><b id="method"></b> <span id="url"></span></p>

<b>Request Payload</b>
<pre id="reqPayload"></pre>

<b>Request Headers</b>
<pre id="reqHeaders"></pre>

<h4>Response</h4>

<b>Status</b>
<p id="status"></p>

<b>Response Payload</b>
<pre id="resPayload"></pre>

<b>Response Headers</b>
<pre id="resHeaders"></pre>

</div>

</div>

<script>

mermaid.initialize({
startOnLoad:false,
securityLevel:"loose",
maxTextSize:900000
})

let metadata={}

function getReqPayload(entry){

let post=entry.request.postData

if(!post) return "No Payload"

if(post.text) return post.text

if(post.params) return JSON.stringify(post.params,null,2)

return "No Payload"

}

function getResPayload(entry){

let content=entry.response.content || {}

let text=content.text || ""

if(!text) return "No Response Body"

try{

if(content.mimeType.includes("json")){
text=JSON.stringify(JSON.parse(text),null,2)
}

}catch(e){}

if(text.length>400){
text=text.substring(0,200)+"\n...\n"+text.substring(text.length-200)
}

return text
}

document.getElementById("harFile").addEventListener("change",function(e){

const file=e.target.files[0]

if(!file) return

const reader=new FileReader()

reader.onload=function(evt){

const har=JSON.parse(evt.target.result)

generateDiagram(har)

}

reader.readAsText(file)

})

function generateDiagram(har){

let entries=har.log.entries

metadata={}

let hosts={}
let hostCounter=1

entries.forEach(e=>{

let url=new URL(e.request.url)

let host=url.hostname

if(!hosts[host]){
hosts[host]="S"+hostCounter++
}

})

let mermaidCode="sequenceDiagram\n"
mermaidCode+="autonumber\n"
mermaidCode+="participant C as Client\n"

for(const host in hosts){

mermaidCode+=`participant ${hosts[host]} as "${host}"\n`

}

entries.forEach((entry,i)=>{

let req=entry.request
let res=entry.response

let url=new URL(req.url)
let host=url.hostname

let alias=hosts[host]

let path=url.pathname
let shortUrl=path.split("/").pop() || "/"

if(shortUrl.length>25){
shortUrl="..."+shortUrl.slice(-22)
}

let method=req.method
let status=res.status

mermaidCode+=`C->>${alias}: "${method} ${shortUrl}"\n`
mermaidCode+=`${alias}-->>C: "${status}"\n`

let num=(i*2)+1

metadata[num]={
method,
url:req.url,
status,
req_headers:Object.fromEntries(req.headers.map(h=>[h.name,h.value])),
req_payload:getReqPayload(entry),
res_headers:Object.fromEntries(res.headers.map(h=>[h.name,h.value])),
res_payload:getResPayload(entry)
}

})

document.getElementById("diagram").textContent=mermaidCode

document.getElementById("stats").innerHTML=
`<span class="badge">Total Requests: ${entries.length}</span>`

mermaid.init(undefined, "#diagram")

setTimeout(bindEvents,1500)

}

function bindEvents(){

document.querySelectorAll(".messageText,.sequenceNumber,.messageLine0,.messageLine1")
.forEach(el=>{

let text=el.textContent || ""

let match=text.match(/^\d+/)

let num=match?match[0]:null

if(num && metadata[num]){

el.style.cursor="pointer"

el.addEventListener("click",()=>showDetails(num))

}

})

}

function showDetails(num){

let data=metadata[num]

document.getElementById("placeholder").style.display="none"
document.getElementById("details").style.display="block"

document.getElementById("method").textContent=data.method
document.getElementById("url").textContent=data.url

document.getElementById("reqPayload").textContent=data.req_payload
document.getElementById("reqHeaders").textContent=JSON.stringify(data.req_headers,null,2)

document.getElementById("status").textContent=data.status

document.getElementById("resPayload").textContent=data.res_payload
document.getElementById("resHeaders").textContent=JSON.stringify(data.res_headers,null,2)

}

</script>

</body>
</html>
